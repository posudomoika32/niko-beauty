<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko Beauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .detail { max-width: 900px; margin: 24px auto; padding: 24px; }
        .detail h3 { margin-top: 40px; }
        .back { display: inline-block; margin-bottom: 12px; color: #7a3e1d; text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="home" class="page active">
    <header class="header">
        <div class="container nav">
            <div class="logo">NIKO BEAUTY</div>
            <ul class="menu">
                <li><a href="#about">О студии</a></li>
                <li><a href="#services">Услуги</a></li>
                <li><a href="#reviews">Отзывы</a></li>
                <li><a href="#contacts">Контакты</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="#/login" class="btn outline small">Вход</a>
                <a href="#/register" class="btn primary small">Регистрация</a>
            </div>
        </div>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>Студия красоты</h1>
            <p>Для гедонистов и ценителей прекрасного</p>
            <div class="hero-buttons">
                <button class="btn primary">Записаться онлайн</button>
                <button class="btn outline">Подарочный сертификат</button>
            </div>
        </div>
    </section>
</body>
</html>
